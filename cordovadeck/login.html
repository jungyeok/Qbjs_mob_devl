<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CordovaDeck — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif}

/* ── MATRIX GRID BACKGROUND (from your styles.css, enhanced) ── */
.grid-bg{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  gap:2px;flex-wrap:wrap;overflow:hidden;
}
.grid-bg::before{
  content:'';position:absolute;width:100%;height:100%;
  background:linear-gradient(#000,rgba(0,255,0,0.4),#000);
  animation:scanline 5s linear infinite;
  z-index:1;pointer-events:none;
}
@keyframes scanline{
  0%{transform:translateY(-100%)}
  100%{transform:translateY(100%)}
}
.grid-bg span{
  position:relative;display:block;
  width:calc(6.25vw - 2px);height:calc(6.25vw - 2px);
  background:#0a0a0a;z-index:2;
  transition:background 1.5s,box-shadow 1.5s;
}
.grid-bg span:hover{
  background:#0f0;box-shadow:0 0 8px #0f0;
  transition:background 0s,box-shadow 0s;
}
/* random glow cells — driven by CSS animation */
.grid-bg span:nth-child(7n+1){animation:glowCell 8s 0.3s infinite}
.grid-bg span:nth-child(11n+2){animation:glowCell 10s 1.1s infinite}
.grid-bg span:nth-child(13n+3){animation:glowCell 7s 2.4s infinite}
.grid-bg span:nth-child(17n+4){animation:glowCell 12s 0.8s infinite}
.grid-bg span:nth-child(19n+5){animation:glowCell 9s 3.2s infinite}
.grid-bg span:nth-child(23n+6){animation:glowCell 11s 1.7s infinite}
@keyframes glowCell{
  0%,90%,100%{background:#0a0a0a;box-shadow:none}
  95%{background:#0f0;box-shadow:0 0 12px #0f0,0 0 24px rgba(0,255,0,0.3)}
}

/* ── LOGIN CARD ── */
.card-wrap{
  position:fixed;inset:0;z-index:100;
  display:flex;justify-content:center;align-items:center;
  padding:16px;
}
.card{
  background:rgba(18,18,18,0.97);
  border:1px solid #1a3a1a;
  border-radius:16px;
  padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:0 0 0 1px rgba(0,255,0,0.08), 0 24px 64px rgba(0,0,0,0.8), 0 0 40px rgba(0,255,0,0.05);
  animation:cardIn 0.5s cubic-bezier(.2,.8,.4,1) both;
}
@keyframes cardIn{from{transform:translateY(24px) scale(0.97);opacity:0}to{transform:none;opacity:1}}

/* Logo */
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-mark{
  width:42px;height:42px;
  background:rgba(0,153,68,0.15);
  border:1px solid rgba(0,255,136,0.3);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:20px;height:20px;stroke:#00ff88;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:20px;font-weight:800;color:#00ff88;letter-spacing:-0.3px;text-shadow:0 0 20px rgba(0,255,136,0.3)}
.logo-sub{font-size:11px;color:#2a5a2a;margin-top:2px;font-family:'JetBrains Mono',monospace}

/* Form */
.form-title{font-size:15px;font-weight:700;color:#c8e8c8;margin-bottom:24px}
.field{margin-bottom:18px;position:relative}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#3a6a3a;margin-bottom:7px}
.field input{
  width:100%;background:#0d160d;
  border:1px solid #1a3a1a;
  border-radius:8px;color:#c8e8c8;
  font-family:'JetBrains Mono',monospace;font-size:14px;
  padding:11px 14px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;
}
.field input:focus{border-color:#009944;box-shadow:0 0 0 3px rgba(0,153,68,0.12)}
.field input::placeholder{color:#1a4a1a}
.field .eye-btn{
  position:absolute;right:12px;top:34px;
  background:none;border:none;cursor:pointer;
  color:#2a5a2a;padding:4px;transition:color 0.15s;
}
.field .eye-btn:hover{color:#00ff88}
.field .eye-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Error / info */
.msg{
  padding:10px 14px;border-radius:7px;
  font-size:13px;font-family:'JetBrains Mono',monospace;
  margin-bottom:16px;display:none;align-items:center;gap:8px;
}
.msg.err{background:rgba(240,80,96,0.08);border:1px solid rgba(240,80,96,0.25);color:#f05060}
.msg.ok{background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.25);color:#00ff88}
.msg.show{display:flex}
.msg svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Rate limit bar */
.attempts-row{display:flex;gap:4px;margin-bottom:16px}
.attempt-dot{width:8px;height:8px;border-radius:50%;background:#1a3a1a;transition:background 0.3s}
.attempt-dot.used{background:#f05060;box-shadow:0 0 4px rgba(240,80,96,0.4)}

/* Submit */
.submit-btn{
  width:100%;padding:13px;
  background:#006622;color:#00ff88;
  border:1px solid #009944;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 12px rgba(0,255,136,0.08);
  margin-bottom:16px;
}
.submit-btn:hover:not(:disabled){background:#007a28;box-shadow:0 0 20px rgba(0,255,136,0.15)}
.submit-btn:active:not(:disabled){transform:scale(0.98)}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.submit-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(0,255,136,0.3);border-top-color:#00ff88;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.card-footer{text-align:center;font-size:11px;color:#1a3a1a;font-family:'JetBrains Mono',monospace;margin-top:8px}

/* Lockout overlay */
.lockout{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.92);display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
  font-family:'JetBrains Mono',monospace;
}
.lockout.show{display:flex}
.lockout-icon{font-size:40px;opacity:0.6}
.lockout-title{font-size:18px;font-weight:700;color:#f05060}
.lockout-msg{font-size:13px;color:#3a3a3a;text-align:center;max-width:300px}
.lockout-timer{font-size:28px;font-weight:800;color:#f05060;font-variant-numeric:tabular-nums}

/* Responsive */
@media(max-width:480px){
  .card{padding:28px 20px}
  .grid-bg span{width:calc(10vw - 2px);height:calc(10vw - 2px)}
}
</style>
</head>
<body>

<!-- Matrix grid background -->
<div class="grid-bg" id="gridBg"></div>

<!-- Login card -->
<div class="card-wrap">
  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><polygon points="12 2 22 12 12 22 2 12"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      </div>
      <div>
        <div class="logo-text">CordovaDeck</div>
        <div class="logo-sub">build dashboard</div>
      </div>
    </div>

    <div class="form-title">Sign in to continue</div>

    <div class="msg err" id="errMsg">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="errText">Invalid credentials</span>
    </div>
    <div class="msg ok" id="okMsg">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Login successful — redirecting...</span>
    </div>

    <!-- Attempt dots (5 max before lockout) -->
    <div class="attempts-row" id="attemptDots">
      <div class="attempt-dot" id="dot0"></div>
      <div class="attempt-dot" id="dot1"></div>
      <div class="attempt-dot" id="dot2"></div>
      <div class="attempt-dot" id="dot3"></div>
      <div class="attempt-dot" id="dot4"></div>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePw()">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <svg viewBox="0 0 24 24" id="submitIcon"><polyline points="15 3 21 3 21 9"/><path d="M21 3L9 15"/><path d="M10 3H3v18h18v-7"/></svg>
        <div class="spinner" id="spinner"></div>
        <span id="submitLabel">Sign In</span>
      </button>
    </form>

    <div class="card-footer" style="margin-bottom:10px">
      <a href="/reset.html" style="color:#2a5a2a;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:11px;transition:color 0.15s" onmouseover="this.style.color='#00ff88'" onmouseout="this.style.color='#2a5a2a'">Forgot password?</a>
    </div>
    <div class="card-footer">Secured · bcrypt hashed · MySQL backed</div>
  </div>
</div>

<!-- Lockout screen -->
<div class="lockout" id="lockoutScreen">
  <div class="lockout-icon">🔒</div>
  <div class="lockout-title">Account Locked</div>
  <div class="lockout-msg">Too many failed attempts. Try again in</div>
  <div class="lockout-timer" id="lockoutTimer">5:00</div>
  <div class="lockout-msg">If this was you, wait and try again.</div>
</div>

<script>
// ── GRID BACKGROUND ────────────────────────────────────────
const grid = document.getElementById('gridBg');
// Generate enough spans to fill the screen
const count = Math.ceil((window.innerWidth / 50) * (window.innerHeight / 50)) + 100;
for (let i = 0; i < count; i++) {
  const s = document.createElement('span');
  grid.appendChild(s);
}

// ── STATE ──────────────────────────────────────────────────
const MAX_ATTEMPTS = 5;
const LOCKOUT_SECS = 300; // 5 minutes
let attempts = 0;
let locked = false;
let lockTimer = null;

// Check if already locked (persisted in sessionStorage)
(function checkLock() {
  const lockUntil = parseInt(sessionStorage.getItem('lockUntil') || '0');
  if (lockUntil > Date.now()) {
    startLockout(Math.ceil((lockUntil - Date.now()) / 1000));
  }
})();

// ── FORM SUBMIT ────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  if (locked) return;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return;

  setBusy(true);
  hideMessages();

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'same-origin',
    });
    const data = await res.json();

    if (res.ok && data.success) {
      // Store session token
      sessionStorage.setItem('authToken', data.token);
      sessionStorage.setItem('authUser', data.username);
      document.getElementById('okMsg').classList.add('show');
      setTimeout(() => { window.location.href = '/index.html'; }, 1200);
    } else {
      attempts++;
      updateDots();
      const remaining = MAX_ATTEMPTS - attempts;
      const msg = remaining > 0
        ? (data.error || 'Invalid username or password') + (remaining <= 2 ? ` (${remaining} attempt${remaining===1?'':'s'} left)` : '')
        : 'Too many failed attempts.';
      showError(msg);
      if (attempts >= MAX_ATTEMPTS) {
        const until = Date.now() + LOCKOUT_SECS * 1000;
        sessionStorage.setItem('lockUntil', until);
        setTimeout(() => startLockout(LOCKOUT_SECS), 600);
      }
    }
  } catch (err) {
    showError('Cannot reach server. Is it running?');
  }

  setBusy(false);
});

function setBusy(b) {
  document.getElementById('submitBtn').disabled = b;
  document.getElementById('submitIcon').style.display = b ? 'none' : '';
  document.getElementById('spinner').style.display = b ? 'block' : 'none';
  document.getElementById('submitLabel').textContent = b ? 'Signing in...' : 'Sign In';
}

function showError(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errMsg').classList.add('show');
  // shake the card
  const card = document.querySelector('.card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'shake 0.4s ease';
}

function hideMessages() {
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('okMsg').classList.remove('show');
}

function updateDots() {
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    document.getElementById('dot' + i).classList.toggle('used', i < attempts);
  }
}

function startLockout(secs) {
  locked = true;
  document.getElementById('lockoutScreen').classList.add('show');
  let remaining = secs;
  function tick() {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    document.getElementById('lockoutTimer').textContent = m + ':' + String(s).padStart(2, '0');
    if (remaining <= 0) {
      locked = false;
      attempts = 0;
      updateDots();
      sessionStorage.removeItem('lockUntil');
      document.getElementById('lockoutScreen').classList.remove('show');
      hideMessages();
      clearInterval(lockTimer);
    }
    remaining--;
  }
  tick();
  lockTimer = setInterval(tick, 1000);
}

// ── PASSWORD VISIBILITY ────────────────────────────────────
function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── SHAKE KEYFRAME ─────────────────────────────────────────
const style = document.createElement('style');
style.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}';
document.head.appendChild(style);

// ── ENTER KEY ─────────────────────────────────────────────
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
